<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OJ 评测机 clicker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1016;
      --panel: #141925;
      --panel-2: #111520;
      --line: #2a3242;
      --line-2: #3a4458;
      --text: #e8edf8;
      --muted: #9aa6ba;
      --good: #6bd68f;
      --warn: #efc75e;
      --bad: #ff7b7b;
      --chip: #1b2230;
      --radius: 8px;
      --sidebar: 290px;
      --rightbar: 360px;
      --topbar-h: 68px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font: 14px/1.45 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #0b0e14 0%, #0d1016 100%);
      color: var(--text);
      overflow: hidden;
    }

    button, input { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: #1a2130;
      color: var(--text);
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background .15s ease, transform .08s ease, opacity .15s ease;
    }
    button:hover:not(:disabled) { background: #20293b; }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .app { height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      min-height: var(--topbar-h);
      border-bottom: 1px solid var(--line);
      background: rgba(9, 12, 18, .96);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 18px;
    }
    .brand { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .brand strong { font-size: 16px; letter-spacing: 0; }
    .brand span,
    .meta,
    .stat-label,
    .hint,
    .list-item small,
    .upgrade-desc,
    .sub,
    .meta-line,
    .empty,
    .log-entry time,
    .queue-foot {
      color: var(--muted);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: var(--chip);
      border: 1px solid var(--line);
      border-radius: 6px;
      white-space: nowrap;
    }
    .stat b { color: var(--text); }

    .main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar) minmax(360px, 1fr) var(--rightbar);
    }
    .panel {
      min-width: 0;
      min-height: 0;
      background: rgba(16, 20, 28, .94);
      overflow: hidden;
    }
    .panel + .panel { border-left: 1px solid var(--line); }
    .panel-inner { height: 100%; min-height: 0; display: flex; flex-direction: column; }
    .panel-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .panel-head h2 { margin: 0; font-size: 15px; }
    .panel-head .sub { font-size: 12px; }
    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 14px 16px 16px;
      flex: 1 1 auto;
    }

    .upgrade-list,
    .queue-list { display: flex; flex-direction: column; gap: 12px; }
    .upgrade-divider {
      position: sticky;
      top: -14px;
      z-index: 1;
      margin: -2px 0 0;
      padding: 8px 10px;
      border: 1px solid var(--line-2);
      border-radius: 999px;
      background: #20283a;
      color: var(--text);
      font-weight: 700;
      text-align: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .22);
    }
    .upgrade {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 12px;
    }
    .upgrade-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .upgrade h3 { margin: 0 0 4px; font-size: 14px; }
    .upgrade-desc { font-size: 12px; margin-bottom: 10px; }
    .upgrade-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      background: #192131;
      border: 1px solid #2e3a4f;
      border-radius: 999px;
      color: #cdd7e7;
      font-size: 12px;
      white-space: nowrap;
    }
    .upgrade-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .primary {
      background: linear-gradient(180deg, #2d8be0 0%, #1f6fb8 100%);
      border-color: #2b7fc8;
    }
    .primary:hover:not(:disabled) { background: linear-gradient(180deg, #3493e9 0%, #2177c6 100%); }

    .center-stage { display: flex; flex-direction: column; min-height: 0; }
    .workbench {
      display: grid;
      gap: 14px;
      padding: 18px;
      height: 100%;
      min-height: 0;
      align-content: start;
    }
    .submit-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #121825 0%, #0f141d 100%);
      padding: 18px;
    }
    .submit-box h2 { margin: 0 0 8px; font-size: 18px; }
    .submit-box p { margin: 0 0 14px; color: var(--muted); }
    .submit-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .submit-btn { min-width: 180px; min-height: 56px; font-size: 18px; font-weight: 700; }
    .submit-btn[disabled] { background: #1d2330; }

    .center-hint {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 12px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .rating-value {
      font-weight: 700;
    }
    .rating-value.unrated {
      color: #000000;
      -webkit-text-stroke: .35px #e8edf8;
      text-shadow: 0 0 2px rgba(255, 255, 255, .55);
    }
    .rating-value.headquarters { color: #000000; -webkit-text-stroke: .35px #e8edf8; }
    .rating-value.newbie { color: #808080; }
    .rating-value.pupil { color: #008000; }
    .rating-value.specialist { color: #03a89e; }
    .rating-value.expert { color: #0000ff; }
    .rating-value.candidate-master { color: #aa00aa; }
    .rating-value.master,
    .rating-value.international-master { color: #ff8c00; }
    .rating-value.grandmaster,
    .rating-value.international-grandmaster { color: #ff0000; }
    .rating-value.legendary-grandmaster,
    .rating-value.tourist {
      color: #ff0000;
      text-shadow: -0.55em 0 0 #000000;
    }
    .rating-title {
      display: inline-flex;
      align-items: center;
      margin-left: 4px;
      padding: 1px 6px;
      border: 1px solid var(--line-2);
      border-radius: 4px;
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      font-weight: 600;
      font-size: 12px;
    }

    .list-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .list-item-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }
    .list-item-note {
      font-size: 12px;
      color: var(--muted);
    }
    .status {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #181f2d;
      font-size: 12px;
      white-space: nowrap;
    }
    .status.good { color: var(--good); }
    .status.warn { color: var(--warn); }
    .status.bad { color: var(--bad); }
    .progress {
      height: 8px;
      background: #0e131c;
      border: 1px solid #273244;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3d8ddb 0%, #6dc3ff 100%);
    }
    .list-item-footer,
    .queue-foot {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .empty {
      border: 1px dashed #334156;
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      background: rgba(12, 16, 23, .55);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .74);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }
    .overlay.show { display: flex; }
    .modal {
      width: min(420px, 100%);
      border: 1px solid #5f2424;
      background: #141016;
      color: var(--text);
      border-radius: 10px;
      overflow: hidden;
    }
    .modal-head {
      padding: 14px 16px;
      background: #2a1113;
      border-bottom: 1px solid #55242a;
      font-weight: 700;
    }
    .modal-body { padding: 16px; }
    .modal-body p { margin: 0 0 14px; color: #f3d9d9; font-size: 15px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

    @media (max-width: 1120px) {
      .main {
        grid-template-columns: 270px minmax(0, 1fr);
        grid-template-rows: 1fr 1fr;
      }
      .panel.right {
        grid-column: 1 / -1;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 840px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .topbar {
        height: auto;
        padding: 12px 14px;
        align-items: flex-start;
        flex-direction: column;
      }
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        overflow: visible;
      }
      .panel + .panel {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
      .panel-body { max-height: none; overflow: visible; }
      .center-cards { grid-template-columns: 1fr; }
      .submit-btn { width: 100%; }
      .submit-row { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <strong>OJ 评测机 clicker</strong>
        <span>提交、排队、炸机、升级，全部在前端完成</span>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <main class="main">
      <section class="panel left">
        <div class="panel-inner">
          <div class="panel-head">
            <div>
              <h2>购买 / 升级</h2>
              <div class="sub">价格会随等级增长</div>
            </div>
          </div>
          <div class="panel-body">
            <div class="upgrade-list" id="upgrades"></div>
          </div>
        </div>
      </section>

      <section class="panel center">
        <div class="panel-inner center-stage">
          <div class="panel-head">
            <div>
              <h2>主操作区</h2>
              <div class="sub">点击提交，生成新的评测记录</div>
            </div>
          </div>
          <div class="workbench">
            <div class="submit-box">
              <h2>提交代码到评测机</h2>
              <p>每次提交会消耗冷却时间，并在右侧生成一条递增的 runid 记录。</p>
              <div class="submit-row">
                <button class="primary submit-btn" id="submitBtn">提交</button>
                <div class="meta" id="submitMeta"></div>
              </div>
            </div>

            <div class="center-cards">
              <div class="info-card">
                <h3>提交规则</h3>
                <p>冷却结束后才能再次提交，升级会降低冷却、提高容量和收益。</p>
              </div>
              <div class="info-card">
                <h3>评测队列</h3>
                <p>右侧只显示未完成和刚结束不久的记录，方便你确认最终结果。</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel right">
        <div class="panel-inner">
          <div class="panel-head">
            <div>
              <h2>未完成评测</h2>
              <div class="sub">列表满载时会炸机</div>
            </div>
            <div class="sub" id="queueCount"></div>
          </div>
          <div class="panel-body">
            <div class="queue-list" id="queueList"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="overlay" id="bombOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="bombTitle">
      <div class="modal-head" id="bombTitle">评测机异常</div>
      <div class="modal-body">
        <p>你把评测机炸了💀</p>
        <div class="modal-actions">
          <button class="primary" id="closeBomb">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'oj-judge-clicker-save-v4';
      const STATUS_STEPS = ['Waiting', 'Compiling', 'Running testcase'];
      const BASE_TESTCASE_COUNT = 5;
      const TESTCASE_BASE_MS = 2000;
      const ALL_ACCEPTED_BONUS = 20;
      const FINAL_RESULTS = [
        { key: 'accepted', weight: 34, color: 'good' },
        { key: 'WA', weight: 22, color: 'warn' },
        { key: 'TLE', weight: 17, color: 'bad' },
        { key: 'MLE', weight: 10, color: 'bad' },
        { key: 'RE', weight: 11, color: 'bad' },
        { key: 'CE', weight: 6, color: 'bad' }
      ];

      const upgradeDefs = [
        {
          key: 'cooldown',
          title: '减少提交冷却',
          desc: '降低提交后的等待时间，指数趋近 0 秒。',
          basePrice: 20,
          priceMul: 1.55,
          effect: level => `提交冷却：${formatCooldown(getCooldownMs(level))} → ${formatCooldown(getCooldownMs(level + 1))}`
        },
        {
          key: 'capacity',
          title: '增加评测容量',
          desc: '扩大未完成队列上限，指数趋近原容量上限。',
          basePrice: 30,
          priceMul: 1.62,
          effect: level => `队列容量：${getCapacity(level)} → ${getCapacity(level + 1)}`
        },
        {
          key: 'accept',
          title: '提高 accepted 概率',
          desc: '提升每个测试点 accepted 的命中率，其他结果同步压缩，指数趋近 100%。',
          basePrice: 45,
          priceMul: 1.7,
          effect: level => `accepted 概率：${Math.round(getAcceptChance(level) * 100)}% → ${Math.round(getAcceptChance(level + 1) * 100)}%`
        },
        {
          key: 'testcase',
          title: '提高测试点 rating 收益',
          desc: '每升级一次，accepted 测试点 rating 奖励恒定 +1，上不封顶。',
          basePrice: 35,
          priceMul: 1.66,
          effect: level => `测试点收益：+${getTestcaseYield(level)} → +${getTestcaseYield(level + 1)} rating`
        },
        {
          key: 'speed',
          title: '优化测试点耗时',
          desc: '降低每个测试点的评测耗时，指数趋近 0ms。',
          basePrice: 40,
          priceMul: 1.58,
          effect: level => `单点耗时：${formatTestcaseDuration(getTestcaseDurationMs(level))} → ${formatTestcaseDuration(getTestcaseDurationMs(level + 1))}`
        },
        {
          key: 'bot',
          title: 'bot 自动提交',
          desc: '每隔特定时间自动提交一份代码，升级会缩短间隔，封底为 0ms。',
          basePrice: 120,
          priceMul: 1.75,
          effect: level => `自动提交间隔：${formatTestcaseDuration(getBotIntervalMs(level))} → ${formatTestcaseDuration(getBotIntervalMs(level + 1))}`
        }
      ];

      const el = {
        stats: document.getElementById('stats'),
        upgrades: document.getElementById('upgrades'),
        submitBtn: document.getElementById('submitBtn'),
        submitMeta: document.getElementById('submitMeta'),
        queueList: document.getElementById('queueList'),
        queueCount: document.getElementById('queueCount'),
        log: document.getElementById('log'),
        bombOverlay: document.getElementById('bombOverlay'),
        closeBomb: document.getElementById('closeBomb')
      };

      const defaultState = () => ({
        rating: 50,
        accepted: 0,
        score: 0,
        ioiEnabled: false,
        nextRunId: 1,
        totalSubmits: 0,
        nextSubmitAt: 0,
        nextBotSubmitAt: 0,
        upgrades: { cooldown: 0, capacity: 0, accept: 0, testcase: 0, speed: 0, bot: 0, testcaseCount: 0 },
        queue: [],
        bombCount: 0,
        bombVisible: false,
        log: [],
        lastTickAt: Date.now()
      });

      let state = loadState();
      let timer = null;
      let bootstrapped = false;

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          return mergeState(defaultState(), JSON.parse(raw));
        } catch {
          return defaultState();
        }
      }

      function mergeState(base, saved) {
        const merged = {
          ...base,
          ...(saved && typeof saved === 'object' ? saved : {})
        };
        merged.upgrades = { ...base.upgrades, ...(saved && saved.upgrades ? saved.upgrades : {}) };
        merged.queue = Array.isArray(saved && saved.queue) ? saved.queue : [];
        merged.finished = Array.isArray(saved && saved.finished) ? saved.finished : [];
        merged.rating = Math.max(0, Number(merged.rating) || 0);
        merged.ioiEnabled = Boolean(merged.ioiEnabled);
        if (saved && typeof saved === 'object' && !('accepted' in saved) && !merged.ioiEnabled) {
          merged.accepted = Math.max(0, Number(saved.score) || 0);
          merged.score = 0;
        } else {
          merged.accepted = Math.max(0, Number(merged.accepted) || 0);
          merged.score = Math.max(0, Number(merged.score) || 0);
        }
        merged.nextRunId = Math.max(1, Number(merged.nextRunId) || 1);
        merged.totalSubmits = Math.max(0, Number(merged.totalSubmits) || 0);
        merged.nextSubmitAt = Math.max(0, Number(merged.nextSubmitAt) || 0);
        merged.nextBotSubmitAt = Math.max(0, Number(merged.nextBotSubmitAt) || 0);
        merged.bombCount = Math.max(0, Number(merged.bombCount) || 0);
        merged.bombVisible = Boolean(merged.bombVisible);
        merged.lastTickAt = Number(merged.lastTickAt) || Date.now();
        return merged;
      }

      function saveState() {
        state.lastTickAt = Date.now();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      function formatNumber(v) {
        return Math.floor(v).toLocaleString('zh-CN');
      }

      function formatCooldown(ms) {
        if (!Number.isFinite(ms)) return '未购买';
        if (ms <= 0) return '0s';
        return `${(ms / 1000).toFixed(ms >= 10000 ? 0 : 1)}s`;
      }

      function formatTestcaseDuration(ms) {
        if (!Number.isFinite(ms)) return '未购买';
        if (ms <= 0) return '0ms';
        return ms < 1000 ? `${ms}ms` : formatCooldown(ms);
      }

      function formatDuration(ms) {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        const rem = s % 60;
        return m <= 0 ? `${rem}s` : `${m}m ${rem}s`;
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function logLine(text) {
        if (!Array.isArray(state.log)) state.log = [];
        state.log.unshift({
          text: String(text || ''),
          at: Date.now()
        });
        state.log = state.log.slice(0, 50);
      }

      function addRating(amount) {
        state.rating += amount;
      }

      function randomChoiceWeighted(items) {
        const total = items.reduce((sum, item) => sum + item.weight, 0);
        let roll = Math.random() * total;
        for (const item of items) {
          roll -= item.weight;
          if (roll <= 0) return item;
        }
        return items[items.length - 1];
      }

      function approachLimit(base, limit, level, decay) {
        return limit - (limit - base) * Math.pow(decay, Math.max(0, level));
      }

      function getCooldownMs(level) {
        return Math.ceil(approachLimit(5000, 0, level, 0.82));
      }

      function getCapacity(level) {
        return Math.floor(approachLimit(100, 660, level, 0.9375));
      }

      function getAcceptChance(level) {
        return approachLimit(0.34, 1, level, 0.9);
      }

      function getTestcaseYield(level) {
        return 2 + Math.max(0, Math.floor(Number(level) || 0));
      }

      function getAllAcceptedBonus(level) {
        return Math.floor(approachLimit(ALL_ACCEPTED_BONUS, 80, level, 11 / 12));
      }

      function getTestcaseDurationMs(level) {
        return Math.ceil(approachLimit(TESTCASE_BASE_MS, 0, level, 0.88));
      }

      function getBotIntervalMs(level) {
        if (level <= 0) return Infinity;
        return Math.ceil(approachLimit(10000, 0, level - 1, 0.82));
      }

      function getPrice(def) {
        const level = state.upgrades[def.key] || 0;
        return Math.ceil(def.basePrice * Math.pow(def.priceMul, level));
      }

      function getScorePrice() {
        return Math.ceil(75 * Math.pow(1.18, state.score || 0));
      }

      function getTestcaseCountPrice() {
        return Math.ceil(160 * Math.pow(1.35, state.upgrades.testcaseCount || 0));
      }

      function getTestcaseCount() {
        return BASE_TESTCASE_COUNT + (state.upgrades.testcaseCount || 0);
      }

      function canAfford(def) {
        return state.rating >= getPrice(def);
      }

      function canBuyIoiRules() {
        return !state.ioiEnabled && state.accepted >= 50;
      }

      function canBuyScore() {
        return state.ioiEnabled && state.rating >= getScorePrice();
      }

      function canBuyTestcaseCount() {
        return state.rating >= getTestcaseCountPrice();
      }

      function resultColor(result) {
        if (result === 'unaccepted') return 'bad';
        const found = FINAL_RESULTS.find(r => r.key === result);
        return found ? found.color : 'warn';
      }

      function numericRunId(job) {
        const runId = Number(job && job.runId);
        return Number.isFinite(runId) ? runId : 0;
      }

      function currentCooldown() {
        return getCooldownMs(state.upgrades.cooldown || 0);
      }

      function queueCapacity() {
        return getCapacity(state.upgrades.capacity || 0);
      }

      function currentPendingCount() {
        return state.queue.length;
      }

      function pickTestcaseResult() {
        const acceptChance = getAcceptChance(state.upgrades.accept || 0);
        if (Math.random() < acceptChance) {
          return FINAL_RESULTS.find(item => item.key === 'accepted');
        }
        const speedBoost = state.upgrades.speed || 0;
        const optimizedFactor = 1 + speedBoost * 0.02;
        const adjusted = FINAL_RESULTS
          .filter(item => item.key !== 'accepted')
          .map(item => {
            if (item.key === 'TLE' || item.key === 'MLE' || item.key === 'RE') {
              return { ...item, weight: item.weight / optimizedFactor };
            }
            return item;
          });
        return randomChoiceWeighted(adjusted);
      }

      function spawnRun(applyManualCooldown = true) {
        const now = Date.now();
        const runId = state.nextRunId++;
        const job = {
          runId,
          createdAt: now,
          stageIndex: 0,
          stageStartAt: now,
          testcaseIndex: 0,
          acceptedCount: 0,
          unacceptedCount: 0,
          scoreRemaining: state.ioiEnabled ? Math.max(0, Number(state.score) || 0) : 0,
          testcaseCount: getTestcaseCount(),
          ratingEarned: 0,
          finalResult: null,
          finalAt: null,
          progress: 0
        };
        state.queue.push(job);
        state.totalSubmits += 1;
        if (applyManualCooldown) {
          state.nextSubmitAt = now + currentCooldown();
        }
        // logLine(`runid #${runId} 已提交到评测队列`);
        if (state.queue.length > queueCapacity()) {
          triggerBomb();
        }
      }

      function triggerBomb() {
        state.bombCount += 1;
        state.queue = [];
        state.bombVisible = true;
        state.nextSubmitAt = Math.max(state.nextSubmitAt, Date.now() + 1000);
        // logLine('评测机炸了，队列已清空');
        renderBomb();
        saveState();
      }

      function finishJob(job, now, resultKey) {
        job.finalResult = resultKey;
        job.finalAt = now;
        job.progress = 100;
        job.resultAt = now;
        job.purgeAt = now + 1500;
        if (resultKey === 'accepted') {
          const bonus = getAllAcceptedBonus(state.upgrades.testcase || 0);
          addRating(bonus);
          job.ratingEarned = Math.max(0, Number(job.ratingEarned) || 0) + bonus;
          addRating(job.ratingEarned);
          state.accepted += 1;
        }
        state.finished.unshift(job);
        state.finished = state.finished.slice(0, 12);
      }

      function tickJobs(now) {
        const nextQueue = [];
        for (const job of state.queue) {
          if (job.finalResult) continue;
          const stageDuration = job.stageIndex < 2 ? 700 : getTestcaseDurationMs(state.upgrades.speed || 0);
          const stageStartAt = Number(job.stageStartAt);
          if (!Number.isFinite(stageStartAt) || stageStartAt <= 0 || stageStartAt > now) {
            job.stageStartAt = now;
          }
          const elapsed = now - job.stageStartAt;
          if (elapsed >= stageDuration) {
            if (job.stageIndex < 2) {
              job.stageIndex += 1;
              job.stageStartAt = now;
            } else {
              const result = pickTestcaseResult();
              const testcaseCount = Math.max(1, Number(job.testcaseCount) || getTestcaseCount());
              if (result.key === 'accepted') {
                const yieldValue = getTestcaseYield(state.upgrades.testcase || 0);
                job.acceptedCount += 1;
                addRating(yieldValue);
                job.ratingEarned = Math.max(0, Number(job.ratingEarned) || 0) + yieldValue;
                if (job.acceptedCount + job.unacceptedCount >= testcaseCount) {
                  finishJob(job, now, job.acceptedCount >= testcaseCount ? 'accepted' : 'unaccepted');
                  continue;
                }
                job.testcaseIndex += 1;
                job.stageStartAt = now;
              } else if (state.ioiEnabled) {
                job.unacceptedCount += 1;
                job.scoreRemaining = Math.max(0, Number(job.scoreRemaining) || 0) - 1;
                if (job.scoreRemaining <= 0 || job.acceptedCount + job.unacceptedCount >= testcaseCount) {
                  finishJob(job, now, 'unaccepted');
                  continue;
                }
                job.testcaseIndex += 1;
                job.stageStartAt = now;
              } else {
                finishJob(job, now, result.key);
                continue;
              }
            }
          }
          nextQueue.push(job);
        }
        state.queue = nextQueue.filter(job => !job.finalResult);
        state.finished = state.finished.filter(job => !job.resultShownAt || now < job.purgeAt);
      }

      function updateCooldown(now) {
        if (state.nextSubmitAt && now >= state.nextSubmitAt) {
          state.nextSubmitAt = 0;
        }
      }

      function updateBot(now) {
        const botLevel = state.upgrades.bot || 0;
        if (botLevel <= 0 || state.bombVisible) {
          state.nextBotSubmitAt = 0;
          return;
        }
        const interval = getBotIntervalMs(botLevel);
        if (!Number.isFinite(interval)) return;
        if (!state.nextBotSubmitAt || state.nextBotSubmitAt > now + interval) {
          state.nextBotSubmitAt = now + interval;
          return;
        }
        const capacity = queueCapacity();
        let guard = 0;
        while (now >= state.nextBotSubmitAt && guard < 25) {
          spawnRun(false);
          if (state.bombVisible || state.queue.length > capacity) break;
          state.nextBotSubmitAt += interval;
          if (interval <= 0) break;
          guard += 1;
        }
        if (interval <= 0 && !state.bombVisible) {
          state.nextBotSubmitAt = now;
        }
      }

      function ratingInfo(rating) {
        const r = Math.floor(Number(rating) || 0);
        const tiers = [
          { min: 4000, cls: 'tourist', title: 'Tourist' },
          { min: 3000, cls: 'legendary-grandmaster', title: 'Legendary Grandmaster' },
          { min: 2600, cls: 'international-grandmaster', title: 'International Grandmaster' },
          { min: 2400, cls: 'grandmaster', title: 'Grandmaster' },
          { min: 2300, cls: 'international-master', title: 'International Master' },
          { min: 2100, cls: 'master', title: 'Master' },
          { min: 1900, cls: 'candidate-master', title: 'Candidate Master' },
          { min: 1600, cls: 'expert', title: 'Expert' },
          { min: 1400, cls: 'specialist', title: 'Specialist' },
          { min: 1200, cls: 'pupil', title: 'Pupil' },
          { min: 0, cls: 'newbie', title: 'Newbie' }
        ];
        const tier = tiers.find(item => r >= item.min) || tiers[tiers.length - 1];
        const decoration = r > 5000 ? ratingDecoration(r - 5000) : '';
        return { ...tier, title: tier.title + decoration };
      }

      function ratingDecoration(extra) {
        const stars = Math.floor(extra / 1000);
        const pluses = Math.floor((extra % 1000) / 250);
        const starText = stars > 9 ? `${stars}*` : '*'.repeat(stars);
        return `${starText}${'+'.repeat(pluses)}`;
      }

      function renderRatingStat() {
        const info = ratingInfo(state.rating);
        return `<span class="rating-value ${info.cls}">${formatNumber(state.rating)}</span><span class="rating-title">${escapeHtml(info.title)}</span>`;
      }

      function computeJobView(job, now) {
        if (job.finalResult) {
          return {
            status: job.finalResult,
            detail: job.finalResult === 'accepted' ? `已完成 · rating 额外 +${formatNumber(job.ratingEarned || 0)}` : '已完成',
            progress: 100,
            color: resultColor(job.finalResult)
          };
        }
        const stageDuration = job.stageIndex < 2 ? 700 : getTestcaseDurationMs(state.upgrades.speed || 0);
        const stageStartAt = Number(job.stageStartAt);
        const elapsed = Number.isFinite(stageStartAt) ? now - stageStartAt : 0;
        const progress = clamp(elapsed / stageDuration, 0, 1);
        const stage = STATUS_STEPS[job.stageIndex] || 'Waiting';
        const nextStage = STATUS_STEPS[job.stageIndex + 1];
        const testcaseCount = Math.max(1, Number(job.testcaseCount) || getTestcaseCount());
        const scoreText = state.ioiEnabled ? ` · runid 得分 ${formatNumber(Math.max(0, Number(job.scoreRemaining) || 0))}` : '';
        const detail = nextStage ? `${stage} → ${nextStage}` : `测试点 ${job.testcaseIndex + 1}/${testcaseCount}${job.unacceptedCount ? ` · unaccepted ${job.unacceptedCount}` : ''}${scoreText}`;
        return {
          status: stage,
          detail,
          progress: Math.round(progress * 100),
          color: 'warn'
        };
      }

      function renderUpgrades() {
        el.upgrades.innerHTML = '';
        renderPhaseShop();
        for (const def of upgradeDefs) {
          const level = state.upgrades[def.key] || 0;
          const price = getPrice(def);
          const disabled = !canAfford(def);
          const node = document.createElement('div');
          node.className = 'upgrade';
          node.innerHTML = `
            <div class="upgrade-top">
              <div>
                <h3>${def.title}</h3>
                <div class="upgrade-desc">${def.desc}</div>
              </div>
              <span class="badge">Lv.${level}</span>
            </div>
            <div class="upgrade-meta">
              <span class="badge">价格：${formatNumber(price)}</span>
              <span class="badge">${def.effect(level)}</span>
            </div>
            <div class="upgrade-actions">
              <button class="primary" data-upgrade="${def.key}" ${disabled ? 'disabled' : ''}>购买</button>
              <span class="hint">${disabled ? 'rating 不足' : '立即生效'}</span>
            </div>
          `;
          el.upgrades.appendChild(node);
        }
      }

      function renderPhaseShop() {
        const divider = document.createElement('div');
        divider.className = 'upgrade-divider';
        divider.textContent = '阶段性商品';
        el.upgrades.appendChild(divider);

        if (!state.ioiEnabled) {
          const node = document.createElement('div');
          node.className = 'upgrade';
          node.innerHTML = `
            <div class="upgrade-top">
              <div>
                <h3>IOI 赛制</h3>
                <div class="upgrade-desc">消耗 50 accepted 解锁得分商店；之后每个 runid 会带着初始得分独立评测，unaccepted 只消耗该 runid 的得分。</div>
              </div>
              <span class="badge">阶段</span>
            </div>
            <div class="upgrade-meta">
              <span class="badge">价格：50 accepted</span>
              <span class="badge">当前 accepted：${formatNumber(state.accepted)}</span>
            </div>
            <div class="upgrade-actions">
              <button class="primary" data-special="ioi" ${canBuyIoiRules() ? '' : 'disabled'}>购买</button>
              <span class="hint">${canBuyIoiRules() ? '购买后该商品消失' : 'accepted 不足'}</span>
            </div>
          `;
          el.upgrades.appendChild(node);
          return;
        }

        const scorePrice = getScorePrice();
        const scoreNode = document.createElement('div');
        scoreNode.className = 'upgrade';
        scoreNode.innerHTML = `
          <div class="upgrade-top">
            <div>
              <h3>初始得分</h3>
              <div class="upgrade-desc">花费 rating 使每个新 runid 的初始得分 +1；该数值只会增加，不会被评测消耗。</div>
            </div>
            <span class="badge">当前 ${formatNumber(state.score)}</span>
          </div>
          <div class="upgrade-meta">
            <span class="badge">价格：${formatNumber(scorePrice)} rating</span>
            <span class="badge">效果：新 runid 初始得分 +1</span>
          </div>
          <div class="upgrade-actions">
            <button class="primary" data-special="score" ${canBuyScore() ? '' : 'disabled'}>购买</button>
            <span class="hint">${canBuyScore() ? '立即生效' : 'rating 不足'}</span>
          </div>
        `;
        el.upgrades.appendChild(scoreNode);

        const testcasePrice = getTestcaseCountPrice();
        const testcaseNode = document.createElement('div');
        testcaseNode.className = 'upgrade';
        testcaseNode.innerHTML = `
          <div class="upgrade-top">
            <div>
              <h3>增加测试点数量</h3>
              <div class="upgrade-desc">花费 rating 使每个新 runid 的测试点数量 +1，价格逐级升高。</div>
            </div>
            <span class="badge">当前 ${formatNumber(getTestcaseCount())}</span>
          </div>
          <div class="upgrade-meta">
            <span class="badge">价格：${formatNumber(testcasePrice)} rating</span>
            <span class="badge">效果：测试点 ${formatNumber(getTestcaseCount())} → ${formatNumber(getTestcaseCount() + 1)}</span>
          </div>
          <div class="upgrade-actions">
            <button class="primary" data-special="testcaseCount" ${canBuyTestcaseCount() ? '' : 'disabled'}>购买</button>
            <span class="hint">${canBuyTestcaseCount() ? '立即生效' : 'rating 不足'}</span>
          </div>
        `;
        el.upgrades.appendChild(testcaseNode);
      }

      function renderStats() {
        const now = Date.now();
        const remain = Math.max(0, state.nextSubmitAt - now);
        const cooldownMs = currentCooldown();
        el.stats.innerHTML = `
          <div class="stat"><span class="stat-label">rating</span><b>${renderRatingStat()}</b></div>
          <div class="stat"><span class="stat-label">accepted</span><b>${formatNumber(state.accepted)}</b></div>
          <div class="stat"><span class="stat-label">初始得分</span><b>${state.ioiEnabled ? formatNumber(state.score) : '未解锁'}</b></div>
          <div class="stat"><span class="stat-label">测试点</span><b>${formatNumber(getTestcaseCount())}</b></div>
          <div class="stat"><span class="stat-label">下个 runid</span><b>#${state.nextRunId}</b></div>
          <div class="stat"><span class="stat-label">总提交</span><b>${formatNumber(state.totalSubmits)}</b></div>
          <div class="stat"><span class="stat-label">容量</span><b>${currentPendingCount()}/${queueCapacity()}</b></div>
          <div class="stat"><span class="stat-label">冷却</span><b>${remain > 0 ? formatCooldown(remain) : formatCooldown(cooldownMs)}</b></div>
          <div class="stat"><span class="stat-label">炸机</span><b>${formatNumber(state.bombCount)}</b></div>
        `;
      }

      function renderSubmit() {
        const now = Date.now();
        const remain = Math.max(0, state.nextSubmitAt - now);
        const canSubmit = remain <= 0 && !state.bombVisible;
        el.submitBtn.disabled = !canSubmit;
        el.submitBtn.textContent = canSubmit ? '提交' : `冷却中 ${Math.ceil(remain / 1000)}s`;
        const botLevel = state.upgrades.bot || 0;
        const botText = botLevel > 0 ? ` · bot 间隔 ${formatTestcaseDuration(getBotIntervalMs(botLevel))}` : '';
        el.submitMeta.textContent = `当前冷却 ${formatCooldown(currentCooldown())} · 单点耗时 ${formatTestcaseDuration(getTestcaseDurationMs(state.upgrades.speed || 0))} · 测试点 ${getTestcaseCount()}${botText} · 队列容量 ${queueCapacity()} · 未完成 ${currentPendingCount()}`;
      }

      function renderQueue() {
        el.queueCount.textContent = `${currentPendingCount()} / ${queueCapacity()}`;
        const now = Date.now();
        const visibleJobs = state.queue
          .concat(state.finished)
          .sort((a, b) => numericRunId(b) - numericRunId(a));
        if (!visibleJobs.length) {
          el.queueList.innerHTML = '<div class="empty">暂无未完成评测</div>';
          return;
        }
        el.queueList.innerHTML = '';
        for (const job of visibleJobs) {
          if (job.finalResult && !job.resultShownAt) {
            job.resultShownAt = now;
            job.purgeAt = now + 1500;
          }
          const view = computeJobView(job, now);
          const item = document.createElement('div');
          item.className = 'list-item';
          item.innerHTML = `
            <div class="list-item-top">
              <div>
                <strong>runid #${job.runId}</strong><br>
                <small>${view.detail}</small>
              </div>
              <span class="status ${view.color}">${view.status}</span>
            </div>
            <div class="progress"><i style="width:${view.progress}%"></i></div>
            <div class="list-item-footer">
              <span>阶段：${STATUS_STEPS[job.stageIndex] || 'Finalizing'}${job.stageIndex >= 2 ? ` ${job.testcaseIndex + 1}/${Math.max(1, Number(job.testcaseCount) || getTestcaseCount())}` : ''}</span>
              <span>已用时：${formatDuration(Math.max(0, now - job.createdAt))}</span>
            </div>
          `;
          el.queueList.appendChild(item);
        }
      }

      function renderLog() {
        if (!el.log) return;
        if (!state.log.length) {
          el.log.innerHTML = '<div class="log-entry">系统已就绪</div>';
          return;
        }
        el.log.innerHTML = state.log.map(item => `
          <div class="log-entry">
            <div>${escapeHtml(item.text)}</div>
            <time>${new Date(item.at).toLocaleTimeString('zh-CN', { hour12: false })}</time>
          </div>
        `).join('');
      }

      function renderBomb() {
        if (!el.bombOverlay) return;
        el.bombOverlay.classList.toggle('show', state.bombVisible);
        el.bombOverlay.setAttribute('aria-hidden', String(!state.bombVisible));
      }

      function renderAll() {
        renderUpgrades();
        renderStats();
        renderSubmit();
        renderQueue();
        renderLog();
        renderBomb();
      }

      function purchaseSpecial(key) {
        if (key === 'ioi') {
          if (!canBuyIoiRules()) return;
          state.accepted -= 50;
          state.ioiEnabled = true;
        } else if (key === 'score') {
          if (!canBuyScore()) return;
          state.rating -= getScorePrice();
          state.score += 1;
        } else if (key === 'testcaseCount') {
          if (!canBuyTestcaseCount()) return;
          state.rating -= getTestcaseCountPrice();
          state.upgrades.testcaseCount = (state.upgrades.testcaseCount || 0) + 1;
        }
        saveState();
        renderAll();
      }

      function purchaseUpgrade(key) {
        const def = upgradeDefs.find(x => x.key === key);
        if (!def) return;
        const level = state.upgrades[key] || 0;
        const price = getPrice(def);
        if (state.rating < price) return;
        state.rating -= price;
        state.upgrades[key] = level + 1;
        // logLine(`购买 ${def.title} Lv.${level + 1}`);
        saveState();
        renderAll();
      }

      function mainLoop() {
        const now = Date.now();
        const delta = now - (state.lastTickAt || now);
        if (delta < 0 || delta > 60000) state.lastTickAt = now;
        updateCooldown(now);
        updateBot(now);
        tickJobs(now);
        renderAll();
        saveState();
      }

      function startLoop() {
        if (!timer) {
          timer = setInterval(mainLoop, 250);
        }
        if (!bootstrapped) {
          window.addEventListener('focus', mainLoop);
          document.addEventListener('visibilitychange', () => {
            if (!document.hidden) mainLoop();
          });
          window.addEventListener('beforeunload', saveState);
          bootstrapped = true;
        }
      }

      el.upgrades.addEventListener('click', e => {
        const specialBtn = e.target.closest('[data-special]');
        if (specialBtn) {
          purchaseSpecial(specialBtn.dataset.special);
          return;
        }
        const btn = e.target.closest('[data-upgrade]');
        if (!btn) return;
        purchaseUpgrade(btn.dataset.upgrade);
      });

      if (el.submitBtn) {
        el.submitBtn.addEventListener('click', () => {
          const now = Date.now();
          if (state.bombVisible) return;
          if (now < state.nextSubmitAt) return;
          spawnRun(true);
          saveState();
          renderAll();
        });
      }

      if (el.closeBomb) {
        el.closeBomb.addEventListener('click', () => {
          state.bombVisible = false;
          // logLine('关闭炸机弹窗');
          saveState();
          renderAll();
        });
      }

      if (el.bombOverlay) {
        el.bombOverlay.addEventListener('click', e => {
          if (e.target === el.bombOverlay && el.closeBomb) el.closeBomb.click();
        });
      }

      state.queue = state.queue.map(job => ({
        ...job,
        runId: Number(job.runId) || 0,
        createdAt: Number(job.createdAt) || Date.now(),
        stageIndex: clamp(Number(job.stageIndex) || 0, 0, STATUS_STEPS.length - 1),
        stageStartAt: sanitizeStageStartAt(job),
        testcaseIndex: clamp(Number(job.testcaseIndex) || 0, 0, Math.max(1, Number(job.testcaseCount) || getTestcaseCount()) - 1),
        acceptedCount: clamp(Number(job.acceptedCount) || 0, 0, Math.max(1, Number(job.testcaseCount) || getTestcaseCount())),
        unacceptedCount: clamp(Number(job.unacceptedCount) || 0, 0, Math.max(1, Number(job.testcaseCount) || getTestcaseCount())),
        scoreRemaining: Math.max(0, Number(job.scoreRemaining) || 0),
        testcaseCount: Math.max(1, Number(job.testcaseCount) || getTestcaseCount()),
        ratingEarned: Math.max(0, Number(job.ratingEarned) || 0),
        finalResult: job.finalResult || null,
        finalAt: Number(job.finalAt) || null,
        progress: Number(job.progress) || 0
      }));

      function sanitizeStageStartAt(job) {
        const now = Date.now();
        const stageStartAt = Number(job.stageStartAt);
        const createdAt = Number(job.createdAt);
        if (Number.isFinite(stageStartAt) && stageStartAt > 0 && stageStartAt <= now) return stageStartAt;
        if (Number.isFinite(createdAt) && createdAt > 0 && createdAt <= now) return createdAt;
        return now;
      }

      state.log = state.log.map(item => ({
        text: String(item.text || ''),
        at: Number(item.at) || Date.now()
      }));

      if (!state.log.length) {
        // logLine('系统已就绪');
      }

      renderAll();
      mainLoop();
      startLoop();
    })();
  </script>
</body>
</html>
