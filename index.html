<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="games/wordle/word.png">
    <title>游戏合集大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            color: #f5f7ff;
            background:
                radial-gradient(circle at top left, rgba(102, 126, 234, 0.32), transparent 34rem),
                radial-gradient(circle at bottom right, rgba(245, 87, 108, 0.22), transparent 30rem),
                #0a0a1a;
        }

        .page {
            width: min(1120px, calc(100% - 40px));
            margin: 0 auto;
            padding: 64px 0;
        }

        .hero {
            margin-bottom: 36px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border: 1px solid rgba(183, 192, 255, 0.25);
            border-radius: 999px;
            color: #c7d2fe;
            background: rgba(17, 17, 36, 0.72);
            letter-spacing: 1px;
            font-size: 0.95rem;
        }

        h1 {
            margin-top: 22px;
            font-size: clamp(2.5rem, 7vw, 5.4rem);
            line-height: 1;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #c7d2fe, #818cf8 48%, #f0abfc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            max-width: 680px;
            margin-top: 18px;
            color: #aab0d5;
            font-size: 1.08rem;
            line-height: 1.8;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 22px;
        }

        .game-card {
            display: flex;
            min-height: 220px;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            border: 1px solid rgba(183, 192, 255, 0.18);
            border-radius: 22px;
            color: inherit;
            text-decoration: none;
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.92), rgba(17, 17, 36, 0.86));
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
            transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            overflow: hidden;
            position: relative;
        }

        .game-card::after {
            content: "";
            position: absolute;
            inset: auto -40px -70px auto;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(102, 126, 234, 0.2);
            filter: blur(4px);
        }

        .game-card:hover,
        .game-card:focus-visible {
            transform: translateY(-6px);
            border-color: rgba(129, 140, 248, 0.75);
            box-shadow: 0 26px 80px rgba(102, 126, 234, 0.22);
            outline: none;
        }

        .game-icon {
            width: 92px;
            height: 46px;
            object-fit: contain;
            object-position: left center;
            image-rendering: auto;
            margin-bottom: 22px;
        }

        .game-badge {
            width: 72px;
            height: 72px;
            display: grid;
            place-items: center;
            margin-bottom: 18px;
            border-radius: 20px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.22), rgba(245, 158, 11, 0.12));
            border: 1px solid rgba(251, 191, 36, 0.28);
            box-shadow: inset 0 0 24px rgba(251, 191, 36, 0.08);
        }

        .game-title {
            font-size: 1.6rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .game-desc {
            color: #aab0d5;
            line-height: 1.7;
        }

        .game-action {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            margin-top: 24px;
            padding: 10px 16px;
            border-radius: 12px;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .empty-card {
            min-height: 220px;
            padding: 24px;
            border: 1px dashed rgba(183, 192, 255, 0.22);
            border-radius: 22px;
            color: #777fa8;
            background: rgba(17, 17, 36, 0.42);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.7;
        }

        footer {
            margin-top: 42px;
            color: #6f7598;
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero" aria-labelledby="hall-title">
            <div class="eyebrow">🎮 Game Collection</div>
            <h1 id="hall-title">游戏合集大厅</h1>
            <p class="subtitle">这里是当前静态站点的游戏入口。每个游戏都放在独立目录中，可直接点击卡片进入游玩。</p>
        </section>

        <section class="games-grid" aria-label="游戏列表">
            <a class="game-card" href="games/wordle/" aria-label="进入 Wordle 猜词游戏">
                <div>
                    <img class="game-icon" src="games/wordle/word.png" alt="WORD">
                    <h2 class="game-title">Wordle / 猜词生成器</h2>
                    <p class="game-desc">随机生成 6 位字符，按组合规则评分，包含积分、历史记录、最高最低记录与十连抽商店。</p>
                </div>
                <span class="game-action">进入游戏 →</span>
            </a>

            <a class="game-card" href="games/judge/" aria-label="进入 Judge Clicker 游戏">
                <div>
                    <div class="game-badge" aria-hidden="true">⚖️</div>
                    <h2 class="game-title">Judge Clicker</h2>
                    <p class="game-desc">点击法槌积累判决点数，提升等级并解锁更高效的审判加成。</p>
                </div>
                <span class="game-action">进入游戏 →</span>
            </a>

            <div class="empty-card">更多游戏入口可继续添加到独立文件夹中。</div>
        </section>

        <footer>静态站点大厅：无需构建步骤，直接打开本页面即可访问。</footer>
    </main>
</body>
</html>
